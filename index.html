<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Canada Trade Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

h1 {
    text-align: center;
    margin: 20px;
}

.container {
    width: 95%;
    max-width: 1200px;
    margin: auto;
}

.kpis {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.card {
    flex: 1;
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

.card h3 {
    margin: 0;
    font-size: 16px;
    color: #94a3b8;
}

.card p {
    font-size: 24px;
    margin: 10px 0 0;
}

.chart-box {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
}

canvas {
    width: 100% !important;
    height: 400px !important;
}
</style>
</head>

<body>

<h1>CA Canada Trade Dashboard</h1>

<div class="container">

<div class="kpis">
    <div class="card">
        <h3>Imports (Last Month)</h3>
        <p id="imports"></p>
    </div>
    <div class="card">
        <h3>Exports (Last Month)</h3>
        <p id="exports"></p>
    </div>
    <div class="card">
        <h3>Trade Balance</h3>
        <p id="balance"></p>
    </div>
</div>

<div class="chart-box">
    <canvas id="chart"></canvas>
</div>

</div>

<script>
fetch("https://huggingface.co/datasets/WilgnerCH/canada-trade-analytics/resolve/main/monthly.json")
.then(res => res.json())
.then(data => {

const labels = [...new Set(data.map(d => d.date))];

const imports = labels.map(d =>
    data.find(x => x.date === d && x.trade_type === "Import")?.Value
);

const exports = labels.map(d =>
    data.find(x => x.date === d && x.trade_type === "Export")?.Value
);

// KPIs
const lastImport = imports[imports.length - 1];
const lastExport = exports[exports.length - 1];
const balance = lastExport - lastImport;

function format(value) {
    const num = value / 1e9;
    return "$" + (Number.isInteger(num) ? num : num.toFixed(1)) + " bi";
}

document.getElementById("imports").innerText = format(lastImport);
document.getElementById("exports").innerText = format(lastExport);
document.getElementById("balance").innerText = format(balance);

// Chart
new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
        labels: labels,
        datasets: [
            {
                label: "Imports",
                data: imports,
                borderColor: "#38bdf8",
                tension: 0.4
            },
            {
                label: "Exports",
                data: exports,
                borderColor: "#f43f5e",
                tension: 0.4
            }
        ]
    },
    options: {
        plugins: {
            legend: {
                labels: { color: "white" }
            }
        },
        scales: {
            y: {
                ticks: {
                    color: "#cbd5e1",
                    callback: v => {
                        const n = v / 1e9;
                        return "$" + (Number.isInteger(n) ? n : n.toFixed(1)) + " bi";
                    }
                }
            },
            x: {
                ticks: { color: "#94a3b8" }
            }
        }
    }
});
});
</script>

</body>
</html>
