name: Monthly Trade Data Update

permissions:
  contents: write

on:
  schedule:
    - cron: '0 8 10 * *'   # 10th of every month at 08:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Build dashboard JSON files from HuggingFace parquet (no StatCan download needed)
      - name: Build dashboard data
        run: python src/build_dashboard_data.py --hf

      - name: List generated files
        run: ls -lh data/*.json

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/*.json
          git diff --cached --quiet || git commit -m "auto-update trade data $(date +%Y-%m)"
          git push
