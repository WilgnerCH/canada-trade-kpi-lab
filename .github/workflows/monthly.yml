name: Monthly Trade Data Update

permissions:
  contents: write

on:
  schedule:
    - cron: '0 6 10 * *'   # 10th of every month at 06:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 1: Download directly from Statistics Canada → data/canada_trade.parquet
      - name: Extract from Statistics Canada
        run: python src/extract_statcan.py

      # Step 2: Upload cleaned parquet to Hugging Face
      - name: Upload to Hugging Face
        run: python src/upload_hf.py

      # Step 3: Build dashboard JSON files from local parquet
      - name: Build dashboard data
        run: python src/build_dashboard_data.py

      # Step 4: Show what was generated
      - name: List generated files
        run: ls -lh data/*.json

      # Step 5: Commit and push updated JSON files
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/*.json
          git diff --cached --quiet || git commit -m "auto-update trade data $(date +%Y-%m)"
          git push
