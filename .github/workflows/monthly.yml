name: Monthly Analytics Update

permissions:
  contents: write

on:
  schedule:
    - cron: '0 6 10 * *'
  workflow_dispatch:

jobs:
  build-analytics:
    runs-on: ubuntu-latest

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # PYTHON SETUP
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # INSTALL DEPENDENCIES
      # =========================
      - name: Install dependencies
        run: pip install -r requirements.txt

      # =========================
      # RUN SCRIPT
      # =========================
      - name: Run aggregation pipeline
        run: python src/build_aggregations.py

      # =========================
      # DEBUG
      # =========================
      - name: List generated files
        run: |
          echo "Files in data folder:"
          ls -la data || echo "No data folder"

      # =========================
      # COMMIT & PUSH
      # =========================
      - name: Commit and push JSON files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add data/*.json

          git diff --cached --quiet || git commit -m "auto-update trade data"

          git push
